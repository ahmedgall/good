<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تخصيص كود التعويض...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            color: white;
            overflow: hidden;
        }

        .loader-container {
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #ffffff;
            line-height: 1.6;
        }

        .progress-box {
            width: 100%;
            height: 10px;
            background-color: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid #333;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00c6ff, #0072bc);
            box-shadow: 0 0 20px rgba(0, 198, 255, 0.6);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .status-text {
            margin-top: 15px;
            font-size: 14px;
            color: #00c6ff;
            min-height: 20px;
        }

        /* تنسيق الزر الذي سيظهر في النهاية */
        #redirect-btn {
            display: none; /* مخفي في البداية */
            margin-top: 25px;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
            animation: popUp 0.5s ease-out forwards;
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="loader-container">
        <h2 id="headline">جاري فحص وتخصيص كود التعويض التراكمي لدولتك...</h2>
        
        <div class="progress-box">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="status-text blink" id="status">جاري تحديد الموقع.. [تم العثور على IP آمن]</div>

        <a href="https://t.me/ASMNKS_45R" id="redirect-btn">
            استلم الكود وابدأ التعويض الآن 💰
        </a>
    </div>

    <script>
        const telegramLink = "https://t.me/ASMNKS_45R";
        let progress = 0;
        const bar = document.getElementById('bar');
        const statusText = document.getElementById('status');
        const btn = document.getElementById('redirect-btn');

        // النصوص المطلوبة
        const steps = [
            "جاري تحديد الموقع.. [تم العثور على IP آمن]",
            "جاري الاتصال بخادم الـ VIP لتوليد الكود...",
            "اكتمل التجهيز! الكود الخاص بك متاح الآن داخل القناة."
        ];

        let stepIndex = 0;

        const interval = setInterval(() => {
            progress += 2.5; // سرعة فائقة
            bar.style.width = progress + "%";

            if (progress > 35 && stepIndex === 0) { 
                statusText.innerText = steps[1]; 
                stepIndex++; 
            }
            if (progress > 85 && stepIndex === 1) { 
                statusText.innerText = steps[2]; 
                statusText.style.color = "#28a745"; // تغيير اللون للأخضر عند النهاية
                stepIndex++; 
            }

            if (progress >= 100) {
                clearInterval(interval);
                statusText.classList.remove('blink');
                
                // إظهار الزر عند اكتمال التحميل
                btn.style.display = "inline-block";

                // تحويل تلقائي بعد ثانية واحدة لضمان دخول العميل حتى لو لم يضغط
                setTimeout(() => {
                    window.location.replace(telegramLink);
                }, 1200);
            }
        }, 50); 
    </script>
</body>
</html>
